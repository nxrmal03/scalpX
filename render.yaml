services:
  - type: web
    name: scalpx-api
    env: python
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REFRESH_INTERVAL
        value: 10
      - key: ALLOWED_ORIGINS
        value: https://scalpx.vercel.app   # update after Vercel gives you the URL
